# .github/workflows/deploy.yml
# ------------------------------------------------------------
# ► Despliegue manual (workflow_dispatch) vía FTP
# ► Proyecto estático (sin build): sube index.html + editor/
# ------------------------------------------------------------

name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Inicio del workflow
        run: echo "Comenzando deploy por FTP..."

      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Preparar staging
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_staging
          mkdir -p deploy_staging
          cp index.html deploy_staging/index.html
          cp -a editor deploy_staging/editor

          # Optional: inject GA_ID into index.html (if configured as a GitHub secret)
          GA_ID="${{ secrets.GA_ID }}"
          if [ -n "${GA_ID:-}" ]; then
            sed -i "s|__GA_ID__|$GA_ID|g" deploy_staging/index.html
          fi

          # Static assets (favicons / manifest)
          for f in \
            favicon.ico \
            favicon.svg \
            favicon-16x16.png \
            favicon-32x32.png \
            apple-touch-icon.png \
            favicon-192x192.png \
            favicon-512x512.png \
            site.webmanifest
          do
            if [ -f "$f" ]; then
              cp "$f" "deploy_staging/$f"
            fi
          done

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: deploy_staging/
          server-dir: ${{ secrets.FTP_DESTINATION }}
          dangerous-clean-slate: false

      - name: Fin del workflow
        run: echo "Deploy completado."
